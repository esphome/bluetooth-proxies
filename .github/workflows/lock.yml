name: Lock

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  lock:
    uses: esphome/workflows/.github/workflows/lock.yml@3c4e8446aa1029f1c346a482034b3ee1489077ca  # 2026.4.0
    with:
      pr-close-days: 1
      issue-close-days: 1
      exclude-label: keep-open
