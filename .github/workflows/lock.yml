name: Lock

on:
  schedule:
    - cron: "0 19 * * *"
  workflow_dispatch:

permissions:
  issues: write
  pull-requests: write

concurrency:
  group: lock

jobs:
  lock:
    uses: esphome/workflows/.github/workflows/lock.yml@9f6577fd37b5cf773ab1b9be929714a0dcd15661  # 2026.7.0
    with:
      pr-close-days: 1
      issue-close-days: 1
      exclude-label: keep-open
